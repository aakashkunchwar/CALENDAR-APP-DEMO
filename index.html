<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calendar</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="calendar-card">

    <!-- Spiral binding -->
    <div class="spiral" aria-hidden="true">
      <span class="ring"></span><span class="ring"></span><span class="ring"></span>
      <span class="ring"></span><span class="ring"></span><span class="ring"></span>
      <span class="ring"></span><span class="ring"></span><span class="ring"></span>
      <span class="ring"></span><span class="ring"></span><span class="ring"></span>
      <span class="ring"></span><span class="ring"></span><span class="ring"></span>
      <span class="ring"></span><span class="ring"></span><span class="ring"></span>
      <span class="ring"></span><span class="ring"></span>
    </div>

    <!-- Monthly Bollywood image banner -->
    <img id="monthBanner" class="month-banner" alt="Month photo" />

    <!-- Header: month navigation -->
    <header class="cal-header">
      <button class="nav-btn" id="prevBtn" aria-label="Previous month">&#8592;</button>
      <h1 class="month-label" id="monthLabel" aria-live="polite" aria-atomic="true"></h1>
      <button class="nav-btn" id="nextBtn" aria-label="Next month">&#8594;</button>
    </header>

    <!-- Day-of-week labels -->
    <div class="cal-dow">
      <span class="dow-sun">Sun</span>
      <span>Mon</span><span>Tue</span><span>Wed</span>
      <span>Thu</span><span>Fri</span><span>Sat</span>
    </div>

    <!-- Month grid — populated by app.js -->
    <main class="cal-grid" id="calGrid" aria-label="Calendar grid"></main>

  </div>

  <!-- Photo attribution bar -->
  <div id="photoCredit" class="photo-credit"></div>

  <!-- Add/Edit modal (outside card so it overlays everything) -->
  <div class="modal-overlay" id="modalOverlay" role="dialog" aria-modal="true" aria-labelledby="modalTitle" hidden>
    <div class="modal">
      <div class="modal-header">
        <h2 id="modalTitle">Add Event</h2>
        <button class="close-btn" id="closeBtn" aria-label="Close">&times;</button>
      </div>

      <form id="eventForm" novalidate>
        <div class="field">
          <label for="fieldTitle">Title <span class="required">*</span></label>
          <input type="text" id="fieldTitle" placeholder="Event title" autocomplete="off" required aria-required="true" aria-describedby="titleError" />
          <span class="field-error" id="titleError"></span>
        </div>

        <div class="field">
          <label for="fieldDate">Date <span class="required">*</span></label>
          <input type="date" id="fieldDate" required aria-required="true" />
        </div>

        <div class="field">
          <label for="fieldTime">Time</label>
          <input type="time" id="fieldTime" />
        </div>

        <div class="field">
          <label for="fieldDesc">Description</label>
          <textarea id="fieldDesc" rows="3" placeholder="Optional notes"></textarea>
        </div>

        <div class="modal-actions">
          <button type="button" class="btn-delete" id="deleteBtn" hidden>Delete</button>
          <button type="submit" class="btn-save">Save</button>
        </div>
      </form>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
